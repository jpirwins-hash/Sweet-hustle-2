<!DOCTYPE html>
<html>
<head>
  <title>Sweet Hustle v5.1</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
      display: flex;
      justify-content: center;
    }

    .game {
      width: 100%;
      max-width: 420px;
      padding-bottom: 30px;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .box {
      background: rgba(255,255,255,0.06);
      margin: 12px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<div class="game">

  <div class="header">
    💰 £<span id="money"></span> |
    📅 Day <span id="day"></span> |
    📍 <span id="location"></span>
  </div>

  <!-- HOME -->
  <div id="homeScreen">

    <div class="box">
      <h3>🏠 Travel</h3>
      <button onclick="showScreen('school')">🏫 School</button>
      <button onclick="showScreen('city')">🏙️ City</button>
      <button onclick="showScreen('festival')">🎡 Festival</button>
      <button onclick="showScreen('night')">🌙 Night</button>
    </div>

  </div>

  <!-- SCHOOL -->
  <div id="schoolScreen" class="hidden">
    <div class="box">
      <h3>🏫 School Shop</h3>

      <button onclick="buy('choc','school')">🍫 Chocolate (£<span id="sc_choc"></span>)</button>
      <button onclick="buy('gum','school')">🍬 Gummies (£<span id="sc_gum"></span>)</button>

      <button onclick="back()">⬅ Back</button>
    </div>
  </div>

  <!-- CITY -->
  <div id="cityScreen" class="hidden">
    <div class="box">
      <h3>🏙️ City Shop</h3>

      <button onclick="buy('choc','city')">🍫 Chocolate (£<span id="ci_choc"></span>)</button>
      <button onclick="buy('cookies','city')">🍪 Cookies (£<span id="ci_cookies"></span>)</button>

      <button onclick="back()">⬅ Back</button>
    </div>
  </div>

  <!-- FESTIVAL -->
  <div id="festivalScreen" class="hidden">
    <div class="box">
      <h3>🎡 Festival Shop</h3>

      <button onclick="buy('lol','festival')">🍭 Lollies (£<span id="fe_lol"></span>)</button>
      <button onclick="buy('rare','festival')">✨ Rare Candy (£<span id="fe_rare"></span>)</button>

      <button onclick="back()">⬅ Back</button>
    </div>
  </div>

  <!-- NIGHT -->
  <div id="nightScreen" class="hidden">
    <div class="box">
      <h3>🌙 Night Market</h3>

      <button onclick="buy('rare','night')">✨ Rare Candy (£<span id="ni_rare"></span>)</button>
      <button onclick="buy('gum','night')">🍬 Gummies (£<span id="ni_gum"></span>)</button>

      <button onclick="back()">⬅ Back</button>
    </div>
  </div>

</div>

<script>

let money = 100;
let day = 1;
let locationName = "Home";

let inventory = {
  choc: 0,
  gum: 0,
  lol: 0,
  cookies: 0,
  rare: 0
};

/* PRICES PER LOCATION */
let prices = {
  school:   { choc: 5, gum: 3 },
  city:     { choc: 10, cookies: 15 },
  festival: { lol: 20, rare: 80 },
  night:    { rare: 120, gum: 8 }
};

/* SCREEN SYSTEM */
function showScreen(screen){

  document.querySelectorAll(".game > div").forEach(div=>{
    if(div.id !== "header") div.classList.add("hidden");
  });

  document.getElementById(screen + "Screen").classList.remove("hidden");

  locationName = screen.charAt(0).toUpperCase() + screen.slice(1);
  updateUI();
}

function back(){
  document.querySelectorAll(".game > div").forEach(div=>{
    if(div.id !== "header") div.classList.add("hidden");
  });

  document.getElementById("homeScreen").classList.remove("hidden");
  locationName = "Home";
  updateUI();
}

/* BUY */
function buy(item, zone){

  let price = prices[zone][item];

  if(money >= price){
    money -= price;
    inventory[item]++;
  }

  updateUI();
}

/* UI */
function updateUI(){

  document.getElementById("money").innerText = money;
  document.getElementById("day").innerText = day;
  document.getElementById("location").innerText = locationName;

  // update visible prices safely
  for(let z in prices){
    for(let i in prices[z]){
      let el = document.querySelectorAll("span");
    }
  }

}

/* INIT */
updateUI();

</script>

</body>
</html>
