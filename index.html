<!DOCTYPE html>
<html>
<head>
  <title>Sweet Hustle v6</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
      display: flex;
      justify-content: center;
    }

    .game {
      width: 100%;
      max-width: 420px;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.08);
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .box {
      background: rgba(255,255,255,0.06);
      margin: 12px;
      padding: 14px;
      border-radius: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-weight: bold;
    }

    .hidden { display:none; }

    .danger {
      color: #ff6b6b;
      font-weight: bold;
    }

    .goal {
      color: #4cd137;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="game">

  <!-- HUD -->
  <div class="header">
    💰 £<span id="money"></span> |
    ⭐ Level <span id="level"></span> |
    🏆 <span id="rank"></span>
    <br>
    🎯 Goal: <span class="goal">Reach £1000</span>
  </div>

  <!-- HOME -->
  <div id="homeScreen">

    <div class="box">
      <h3>🧍 Your Run</h3>

      <p>Start from nothing and build your candy empire.</p>

      <p class="danger">If money hits £0 → GAME OVER</p>
    </div>

    <div class="box">
      <h3>🏪 Travel</h3>
      <button onclick="show('school')">🏫 School</button>
      <button onclick="show('city')">🏙️ City</button>
      <button onclick="show('festival')">🎡 Festival</button>
      <button onclick="show('night')">🌙 Night</button>
    </div>

  </div>

  <!-- SCREENS -->
  <div id="schoolScreen" class="hidden box">
    <h3>🏫 School</h3>
    <button onclick="sell('choc')">Sell Chocolate</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <div id="cityScreen" class="hidden box">
    <h3>🏙️ City</h3>
    <button onclick="sell('cookies')">Sell Cookies</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <div id="festivalScreen" class="hidden box">
    <h3>🎡 Festival</h3>
    <button onclick="sell('lol')">Sell Lollies</button>
    <button onclick="sell('rare')">Sell Rare Candy</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <div id="nightScreen" class="hidden box">
    <h3>🌙 Night</h3>
    <button onclick="sell('rare')">Sell Rare Candy</button>
    <button onclick="back()">⬅ Back</button>
  </div>

</div>

<script>

/* ================= STARTING RUN ================= */

let money = 20;   // 🔥 HARD START (important!)
let level = 1;
let xp = 0;
let xpNeeded = 20;

/* INVENTORY */
let inventory = {
  choc: 0,
  cookies: 0,
  lol: 0,
  rare: 0
};

/* MISSIONS (kept simple for now) */
let missions = {
  choc: { target:5, progress:0, reward:50 },
  cookies: { target:4, progress:0, reward:80 },
  lol: { target:3, progress:0, reward:100 },
  rare: { target:2, progress:0, reward:200 }
};

/* SCREEN */
function show(screen){
  hideAll();
  document.getElementById(screen + "Screen").classList.remove("hidden");
  updateUI();
}

function back(){
  hideAll();
  document.getElementById("homeScreen").classList.remove("hidden");
  updateUI();
}

function hideAll(){
  document.querySelectorAll(".game > div").forEach(d=>{
    if(d.id !== "homeScreen") d.classList.add("hidden");
  });
}

/* XP + LEVEL */
function addXP(amount){
  xp += amount;

  if(xp >= xpNeeded){
    xp -= xpNeeded;
    level++;
    xpNeeded = Math.floor(xpNeeded * 1.25);

    money += 20; // small reward
  }
}

/* SELL SYSTEM */
function sell(item){

  let baseValue = 10;

  if(item === "rare") baseValue = 40;
  if(item === "lol") baseValue = 20;
  if(item === "cookies") baseValue = 15;

  money += baseValue;

  inventory[item]++;

  addXP(5);

  if(money <= 0){
    alert("💀 GAME OVER - You went bankrupt!");
    location.reload();
  }

  updateUI();
}

/* RANK SYSTEM */
function getRank(){
  if(level >= 10) return "Candy King";
  if(level >= 5) return "Dealer";
  return "Hustler";
}

/* UI */
function updateUI(){

  document.getElementById("money").innerText = money;
  document.getElementById("level").innerText = level;
  document.getElementById("rank").innerText = getRank();

}

/* START */
updateUI();

</script>

</body>
</html>
