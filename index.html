<!DOCTYPE html>
<html>
<head>
  <title>Sweet Hustle v4.4</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
      display: flex;
      justify-content: center;
    }

    .game {
      width: 100%;
      max-width: 420px;
      padding-bottom: 30px;
    }

    /* TOP HUD */
    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .hud {
      font-size: 13px;
      opacity: 0.9;
    }

    /* GLASS CARDS */
    .box {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      margin: 12px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    h3 {
      margin-top: 0;
    }

    /* BUTTONS (neutral game style) */
    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-weight: bold;
    }

    button:active {
      transform: scale(0.98);
    }

    .good { background: rgba(46, 204, 113, 0.6); }
    .bad { background: rgba(231, 76, 60, 0.6); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mission {
      font-size: 13px;
      opacity: 0.9;
      line-height: 1.4;
    }

  </style>
</head>

<body>

<div class="game">

  <div class="header">
    <div class="title">🍭 Sweet Hustle</div>
    <div class="hud">
      💰 £<span id="money"></span> |
      📅 Day <span id="day"></span> |
      📍 <span id="location"></span>
    </div>
    <div class="hud">
      🏆 <span id="rank"></span>
    </div>
  </div>

  <div class="box">
    <h3>🧠 Missions</h3>
    <div class="mission" id="missionText"></div>
  </div>

  <div class="box">
    <h3>📍 Travel</h3>
    <div class="grid">
      <button onclick="travel('School')">🏫 School</button>
      <button onclick="travel('City')">🏙️ City</button>
      <button onclick="travel('Shop')">🏪 Shop</button>
      <button onclick="travel('Festival')">🎡 Festival</button>
    </div>
  </div>

  <div class="box">
    <h3>🍬 Trading</h3>

    <button onclick="buy('choc')">Buy Chocolate 🍫</button>
    <button onclick="sell('choc')">Sell Chocolate 🍫</button>

    <button onclick="buy('gum')">Buy Gummies 🍬</button>
    <button onclick="sell('gum')">Sell Gummies 🍬</button>

    <button onclick="buy('lol')">Buy Lollies 🍭</button>
    <button onclick="sell('lol')">Sell Lollies 🍭</button>

    <button onclick="buy('rare')">Buy Rare ✨</button>
    <button onclick="sell('rare')">Sell Rare ✨</button>
  </div>

  <div class="box">
    <h3>🛠️ Upgrades</h3>
    <button onclick="upgrade('storage')">📦 Storage</button>
    <button onclick="upgrade('luck')">🍀 Luck</button>
    <button onclick="upgrade('trade')">💹 Trade</button>
  </div>

  <div class="box">
    <button class="good" onclick="nextDay()">➡️ Next Day</button>
    <button class="bad" onclick="resetGame()">🔄 Reset</button>
  </div>

</div>

<script>

let money = 100;
let day = 1;
let locationName = "School";
let rank = "Street Trader";

let inventory = { choc: 0, gum: 0, lol: 0, rare: 0 };
let prices = { choc: 10, gum: 5, lol: 3, rare: 50 };

let mission = {
  text: "Make £200",
  reward: 100,
  target: 200
};

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function marketModifier(loc){
  if(loc==="School") return 0.8;
  if(loc==="City") return 1.1;
  if(loc==="Shop") return 0.9;
  if(loc==="Festival") return 1.6;
  return 1;
}

/* PRICE SYSTEM */
function updatePrices(){
  let mod = marketModifier(locationName);

  prices.choc = Math.max(1, rand(5,15)*mod);
  prices.gum = Math.max(1, rand(2,10)*mod);
  prices.lol = Math.max(1, rand(1,8)*mod);
  prices.rare = Math.max(10, rand(30,120)*mod);
}

/* MISSIONS */
function updateMission(){
  if(money >= mission.target){
    money += mission.reward;
    mission.target += 300;
    mission.reward += 50;

    alert("🎯 Mission Complete! Reward given!");
  }

  document.getElementById("missionText").innerText =
    "Goal: Reach £" + mission.target +
    " | Reward: £" + mission.reward;
}

/* GAME ACTIONS */
function buy(item){
  if(money >= prices[item]){
    money -= prices[item];
    inventory[item]++;
  }
  updateUI();
}

function sell(item){
  if(inventory[item] > 0){
    money += prices[item];
    inventory[item]--;
  }
  updateUI();
}

function travel(loc){
  locationName = loc;
  updatePrices();
  updateUI();
}

function upgrade(type){
  if(type==="storage" && money>=200) money-=200;
  if(type==="luck" && money>=300) money-=300;
  if(type==="trade" && money>=400) money-=400;
  updateUI();
}

function nextDay(){
  day++;

  updatePrices();

  if(money>5000) rank="Sweet King";
  else if(money>2000) rank="Dealer";
  else if(money>500) rank="Trader";

  updateMission();
  updateUI();
}

function resetGame(){
  location.reload();
}

/* UI */
function updateUI(){
  document.getElementById("money").innerText = Math.floor(money);
  document.getElementById("day").innerText = day;
  document.getElementById("location").innerText = locationName;
  document.getElementById("rank").innerText = rank;

  updateMission();
}

updatePrices();
updateUI();

</script>

</body>
</html>
