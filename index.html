<!DOCTYPE html>
<html>
<head>
  <title>Sweet Hustle v4</title>
  <style>
    body {
      font-family: Arial;
      background: #fff0f5;
      text-align: center;
      padding: 10px;
    }
    .box {
      background: white;
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      box-shadow: 0 0 10px #ddd;
    }
    button {
      padding: 10px;
      margin: 4px;
      border: none;
      border-radius: 8px;
      background: #ff4da6;
      color: white;
    }
    .good { background: #2ecc71; }
    .bad { background: #e74c3c; }
  </style>
</head>

<body>

<h2>🍭 Sweet Hustle v4</h2>

<div class="box">
  💰 Money: £<span id="money"></span><br>
  📅 Day: <span id="day"></span><br>
  📍 Location: <span id="location"></span><br>
  🏆 Rank: <span id="rank"></span><br>
</div>

<div class="box">
  <button onclick="travel('School')">🏫 School</button>
  <button onclick="travel('City')">🏙️ City</button>
  <button onclick="travel('Shop')">🏪 Shop</button>
  <button onclick="travel('Festival')">🎡 Festival</button>
  <button onclick="travel('Night')">🌆 Night Market</button>
</div>

<div class="box">
  <h3>🍬 Prices</h3>
  🍫 Choco: £<span id="choc"></span><br>
  🍬 Gummies: £<span id="gum"></span><br>
  🍭 Lollies: £<span id="lol"></span><br>
  ✨ Rare Candy: £<span id="rare"></span>
</div>

<div class="box">
  <h3>Buy / Sell</h3>

  <button onclick="buy('choc')">🍫 Buy</button>
  <button onclick="sell('choc')">Sell</button><br>

  <button onclick="buy('gum')">🍬 Buy</button>
  <button onclick="sell('gum')">Sell</button><br>

  <button onclick="buy('lol')">🍭 Buy</button>
  <button onclick="sell('lol')">Sell</button><br>

  <button onclick="buy('rare')">✨ Buy Rare</button>
  <button onclick="sell('rare')">Sell Rare</button>
</div>

<div class="box">
  <h3>🛠️ Upgrades</h3>
  <button onclick="upgrade('storage')">📦 Bigger Storage (£200)</button>
  <button onclick="upgrade('luck')">🍀 Better Luck (£300)</button>
  <button onclick="upgrade('trade')">💹 Better Trades (£400)</button>
</div>

<div class="box">
  <button class="good" onclick="nextDay()">➡️ Next Day</button>
  <button class="bad" onclick="resetGame()">🔄 Reset</button>
</div>

<script>

let money = 100;
let day = 1;
let locationName = "School";
let storage = 10;

let upgrades = {
  storage: 0,
  luck: 0,
  trade: 0
};

let inventory = {
  choc: 0,
  gum: 0,
  lol: 0,
  rare: 0
};

let prices = {
  choc: 10,
  gum: 5,
  lol: 3,
  rare: 50
};

let rank = "Street Trader";

function marketModifier(loc) {
  if (loc === "School") return 0.8;
  if (loc === "City") return 1.1;
  if (loc === "Shop") return 0.9;
  if (loc === "Festival") return 1.6;
  if (loc === "Night") return 1.8;
  return 1;
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function updatePrices() {
  let mod = marketModifier(locationName);

  prices.choc = Math.max(1, rand(5,15) * mod);
  prices.gum = Math.max(1, rand(2,10) * mod);
  prices.lol = Math.max(1, rand(1,8) * mod);
  prices.rare = Math.max(10, rand(30,120) * mod);

  events();
}

function events() {
  let r = Math.random();

  if (r < 0.10) {
    alert("🍫 Chocolate craze!");
    prices.choc *= 2;
  }
  else if (r < 0.18) {
    alert("🚨 Inspection! -£20");
    money -= 20;
  }
  else if (r < 0.25) {
    alert("🎁 Found rare candy!");
    money += 80;
  }
  else if (r < 0.30) {
    alert("📉 Market crash!");
    for (let k in prices) prices[k] *= 0.5;
  }
}

function travel(loc){
  locationName = loc;
  updatePrices();
  updateUI();
}

function buy(item){
  if (inventoryTotal() >= storage) return alert("📦 No space!");

  if (money >= prices[item]){
    money -= prices[item];
    inventory[item]++;
    updateUI();
  }
}

function sell(item){
  if (inventory[item] > 0){
    money += prices[item];
    inventory[item]--;
    updateUI();
  }
}

function inventoryTotal(){
  return inventory.choc + inventory.gum + inventory.lol + inventory.rare;
}

function upgrade(type){
  if (type === "storage" && money >= 200){
    money -= 200;
    storage += 5;
    upgrades.storage++;
  }

  if (type === "luck" && money >= 300){
    money -= 300;
    upgrades.luck++;
  }

  if (type === "trade" && money >= 400){
    money -= 400;
    upgrades.trade++;
  }

  updateUI();
}

function nextDay(){
  day++;

  updatePrices();

  if (money > 5000) rank = "Sweet King";
  else if (money > 2000) rank = "Dealer";
  else if (money > 500) rank = "Trader";

  updateUI();
}

function resetGame(){
  location.reload();
}

function updateUI(){
  document.getElementById("money").innerText = Math.floor(money);
  document.getElementById("day").innerText = day;
  document.getElementById("location").innerText = locationName;
  document.getElementById("rank").innerText = rank;

  document.getElementById("choc").innerText = Math.floor(prices.choc);
  document.getElementById("gum").innerText = Math.floor(prices.gum);
  document.getElementById("lol").innerText = Math.floor(prices.lol);
  document.getElementById("rare").innerText = Math.floor(prices.rare);
}

updatePrices();
updateUI();

</script>

</body>
</html>
