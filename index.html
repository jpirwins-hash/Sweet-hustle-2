<!DOCTYPE html>
<html>
<head>
  <title>Sweet Hustle v5.4</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
      display: flex;
      justify-content: center;
    }

    .game {
      width: 100%;
      max-width: 420px;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 14px;
    }

    .box {
      background: rgba(255,255,255,0.06);
      margin: 12px;
      padding: 14px;
      border-radius: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-weight: bold;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<div class="game">

  <div class="header">
    💰 £<span id="money"></span> |
    📍 <span id="location"></span>
  </div>

  <!-- HOME -->
  <div id="homeScreen">

    <div class="box">
      <h3>🏠 Travel</h3>
      <button onclick="show('school')">🏫 School</button>
      <button onclick="show('city')">🏙️ City</button>
      <button onclick="show('festival')">🎡 Festival</button>
      <button onclick="show('night')">🌙 Night</button>
    </div>

    <div class="box">
      <h3>🧠 Missions</h3>
      <div id="missions"></div>
    </div>

  </div>

  <!-- SCREENS -->
  <div id="schoolScreen" class="hidden box">
    <h3>🏫 School</h3>
    <button onclick="sell('choc')">Sell Chocolate</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <div id="cityScreen" class="hidden box">
    <h3>🏙️ City</h3>
    <button onclick="sell('cookies')">Sell Cookies</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <div id="festivalScreen" class="hidden box">
    <h3>🎡 Festival</h3>
    <button onclick="sell('lol')">Sell Lollies</button>
    <button onclick="sell('rare')">Sell Rare Candy</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <div id="nightScreen" class="hidden box">
    <h3>🌙 Night</h3>
    <button onclick="sell('rare')">Sell Rare Candy</button>
    <button onclick="back()">⬅ Back</button>
  </div>

</div>

<script>

/* ================= SOUND SYSTEM ================= */

const sounds = {
  buy: new Audio("https://actions.google.com/sounds/v1/cash_register/coins.wav"),
  sell: new Audio("https://actions.google.com/sounds/v1/cash_register/cash_register_01.mp3"),
  mission: new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"),
  error: new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg")
};

function playSound(type){

  if(!sounds[type]) return;

  sounds[type].currentTime = 0;
  sounds[type].play().catch(()=>{});
}

/* ================= STATE ================= */

let money = 100;
let locationName = "Home";

let inventory = {};
let missions = {};

/* ================= INIT / LOAD ================= */

function initGame(){

  let saved = localStorage.getItem("sweetSave");

  if(saved){
    let data = JSON.parse(saved);
    money = data.money;
    locationName = data.locationName;
    inventory = data.inventory;
    missions = data.missions;
  } else {

    inventory = {
      choc: 0,
      gum: 0,
      lol: 0,
      cookies: 0,
      rare: 0
    };

    missions = {
      choc: { target:5, progress:0, reward:50 },
      gum: { target:8, progress:0, reward:60 },
      lol: { target:3, progress:0, reward:80 },
      cookies: { target:6, progress:0, reward:100 },
      rare: { target:2, progress:0, reward:200 }
    };
  }
}

/* ================= SAVE ================= */

function saveGame(){
  localStorage.setItem("sweetSave", JSON.stringify({
    money,
    locationName,
    inventory,
    missions
  }));
}

/* ================= SCREEN SYSTEM ================= */

function show(screen){
  hideAll();
  document.getElementById(screen + "Screen").classList.remove("hidden");
  locationName = screen;
  updateUI();
  saveGame();
}

function back(){
  hideAll();
  document.getElementById("homeScreen").classList.remove("hidden");
  locationName = "Home";
  updateUI();
  saveGame();
}

function hideAll(){
  document.querySelectorAll(".game > div").forEach(d=>{
    if(d.id !== "homeScreen") d.classList.add("hidden");
  });
}

/* ================= SELL + MISSIONS ================= */

function sell(item){

  inventory[item]++;

  money += 10;

  playSound("sell");

  if(missions[item]){

    missions[item].progress++;

    if(missions[item].progress >= missions[item].target){

      money += missions[item].reward;

      missions[item].target += 2;
      missions[item].progress = 0;
      missions[item].reward += 25;

      playSound("mission");
      alert("🎯 Mission Complete: " + item.toUpperCase());
    }
  }

  updateUI();
  saveGame();
}

/* ================= UI ================= */

function updateMissions(){

  let html = "";

  for(let item in missions){
    let m = missions[item];

    html += `
      <div style="margin-bottom:8px">
        <b>${item.toUpperCase()}</b><br>
        ${m.progress}/${m.target} → £${m.reward}
      </div>
    `;
  }

  document.getElementById("missions").innerHTML = html;
}

function updateUI(){
  document.getElementById("money").innerText = money;
  document.getElementById("location").innerText = locationName;
  updateMissions();
}

/* ================= START ================= */

initGame();
updateUI();

</script>

</body>
</html>
