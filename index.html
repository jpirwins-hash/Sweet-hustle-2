<!DOCTYPE html>
<html>
<head>
  <title>Sweet Hustle v5.5</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
      display: flex;
      justify-content: center;
    }

    .game {
      width: 100%;
      max-width: 420px;
    }

    /* ================= HUD ================= */

    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .hud-line {
      font-size: 13px;
      margin: 2px 0;
    }

    .xp-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 6px;
    }

    .xp-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
    }

    /* ================= BOX ================= */

    .box {
      background: rgba(255,255,255,0.06);
      margin: 12px;
      padding: 14px;
      border-radius: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-weight: bold;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<div class="game">

  <!-- ================= HUD ================= -->
  <div class="header">

    <div class="hud-line">
      💰 £<span id="money"></span> |
      📅 Day <span id="day"></span> |
      📍 <span id="location"></span>
    </div>

    <div class="hud-line">
      🏆 <span id="rank"></span> |
      ⭐ Level <span id="level"></span>
    </div>

    <div class="xp-bar">
      <div class="xp-fill" id="xpFill"></div>
    </div>

  </div>

  <!-- HOME -->
  <div id="homeScreen">

    <div class="box">
      <h3>🏠 Travel</h3>
      <button onclick="show('school')">🏫 School</button>
      <button onclick="show('city')">🏙️ City</button>
      <button onclick="show('festival')">🎡 Festival</button>
      <button onclick="show('night')">🌙 Night</button>
    </div>

    <div class="box">
      <h3>🧠 Missions</h3>
      <div id="missions"></div>
    </div>

  </div>

  <!-- SCREENS -->
  <div id="schoolScreen" class="hidden box">
    <h3>🏫 School</h3>
    <button onclick="sell('choc')">Sell Chocolate</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <div id="cityScreen" class="hidden box">
    <h3>🏙️ City</h3>
    <button onclick="sell('cookies')">Sell Cookies</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <div id="festivalScreen" class="hidden box">
    <h3>🎡 Festival</h3>
    <button onclick="sell('lol')">Sell Lollies</button>
    <button onclick="sell('rare')">Sell Rare Candy</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <div id="nightScreen" class="hidden box">
    <h3>🌙 Night</h3>
    <button onclick="sell('rare')">Sell Rare Candy</button>
    <button onclick="back()">⬅ Back</button>
  </div>

</div>

<script>

/* ================= STATE ================= */

let money = 100;
let locationName = "Home";

let level = 1;
let xp = 0;
let xpNeeded = 20;

let inventory = {};
let missions = {};

/* ================= INIT ================= */

function initGame(){

  let saved = localStorage.getItem("sweetSave");

  if(saved){
    let data = JSON.parse(saved);

    money = data.money;
    locationName = data.locationName;
    inventory = data.inventory;
    missions = data.missions;

    level = data.level;
    xp = data.xp;
    xpNeeded = data.xpNeeded;

  } else {

    inventory = {
      choc: 0,
      gum: 0,
      lol: 0,
      cookies: 0,
      rare: 0
    };

    missions = {
      choc: { target:5, progress:0, reward:50 },
      gum: { target:8, progress:0, reward:60 },
      lol: { target:3, progress:0, reward:80 },
      cookies: { target:6, progress:0, reward:100 },
      rare: { target:2, progress:0, reward:200 }
    };
  }
}

/* ================= SAVE ================= */

function saveGame(){
  localStorage.setItem("sweetSave", JSON.stringify({
    money,
    locationName,
    inventory,
    missions,
    level,
    xp,
    xpNeeded
  }));
}

/* ================= XP SYSTEM ================= */

function addXP(amount){

  xp += amount;

  if(xp >= xpNeeded){
    xp -= xpNeeded;
    level++;
    xpNeeded = Math.floor(xpNeeded * 1.3);

    money += 50; // level up reward
  }
}

/* ================= SCREEN ================= */

function show(screen){
  hideAll();
  document.getElementById(screen + "Screen").classList.remove("hidden");
  locationName = screen;
  updateUI();
  saveGame();
}

function back(){
  hideAll();
  document.getElementById("homeScreen").classList.remove("hidden");
  locationName = "Home";
  updateUI();
  saveGame();
}

function hideAll(){
  document.querySelectorAll(".game > div").forEach(d=>{
    if(d.id !== "homeScreen") d.classList.add("hidden");
  });
}

/* ================= SELL ================= */

function sell(item){

  inventory[item]++;

  money += 10;

  addXP(5);

  if(missions[item]){
    missions[item].progress++;

    if(missions[item].progress >= missions[item].target){
      money += missions[item].reward;

      missions[item].target += 2;
      missions[item].progress = 0;
      missions[item].reward += 25;

      alert("🎯 Mission Complete: " + item.toUpperCase());
    }
  }

  updateUI();
  saveGame();
}

/* ================= RANK ================= */

function getRank(){
  if(level >= 10) return "Candy King";
  if(level >= 5) return "Sweet Dealer";
  return "Street Hustler";
}

/* ================= UI ================= */

function updateMissions(){

  let html = "";

  for(let item in missions){
    let m = missions[item];

    html += `
      <div style="margin-bottom:8px">
        <b>${item.toUpperCase()}</b><br>
        ${m.progress}/${m.target} → £${m.reward}
      </div>
    `;
  }

  document.getElementById("missions").innerHTML = html;
}

function updateUI(){

  document.getElementById("money").innerText = money;
  document.getElementById("location").innerText = locationName;

  document.getElementById("level").innerText = level;
  document.getElementById("rank").innerText = getRank();

  let percent = (xp / xpNeeded) * 100;
  document.getElementById("xpFill").style.width = percent + "%";

  updateMissions();
}

/* ================= START ================= */

initGame();
updateUI();

</script>

</body>
</html>
