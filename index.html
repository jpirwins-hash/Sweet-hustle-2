<!DOCTYPE html>
<html>
<head>
  <title>Sweet Hustle v7.1</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
      display: flex;
      justify-content: center;
    }

    .game {
      width: 100%;
      max-width: 420px;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.08);
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .box {
      background: rgba(255,255,255,0.06);
      margin: 12px;
      padding: 14px;
      border-radius: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-weight: bold;
    }

    .hidden { display:none; }
    .event {
      color: #ffd166;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="game">

  <div class="header">
    💰 £<span id="money"></span> |
    📍 <span id="location"></span>
  </div>

  <div id="eventBox" class="box hidden"></div>

  <!-- HOME -->
  <div id="homeScreen">

    <div class="box">
      <h3>📍 Travel</h3>
      <button onclick="travel('school')">🏫 School</button>
      <button onclick="travel('city')">🏙️ City</button>
      <button onclick="travel('festival')">🎡 Festival</button>
      <button onclick="travel('night')">🌙 Night</button>
    </div>

    <div class="box">
      <h3>📦 Inventory</h3>
      <div id="inventory"></div>
    </div>

  </div>

  <!-- SCHOOL -->
  <div id="schoolScreen" class="hidden box">
    <h3>🏫 School Market</h3>
    <button onclick="buy('choc')">Buy Chocolate (£<span id="sc_buy"></span>)</button>
    <button onclick="sell('choc')">Sell Chocolate (£<span id="sc_sell"></span>)</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <!-- CITY -->
  <div id="cityScreen" class="hidden box">
    <h3>🏙️ City Market</h3>
    <button onclick="buy('cookies')">Buy Cookies (£<span id="ci_buy"></span>)</button>
    <button onclick="sell('cookies')">Sell Cookies (£<span id="ci_sell"></span>)</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <!-- FESTIVAL -->
  <div id="festivalScreen" class="hidden box">
    <h3>🎡 Festival Market</h3>
    <button onclick="buy('lol')">Buy Lollies (£<span id="fe_buy"></span>)</button>
    <button onclick="sell('lol')">Sell Lollies (£<span id="fe_sell"></span>)</button>
    <button onclick="back()">⬅ Back</button>
  </div>

  <!-- NIGHT -->
  <div id="nightScreen" class="hidden box">
    <h3>🌙 Night Market</h3>
    <button onclick="buy('rare')">Buy Rare (£<span id="ni_buy"></span>)</button>
    <button onclick="sell('rare')">Sell Rare (£<span id="ni_sell"></span>)</button>
    <button onclick="back()">⬅ Back</button>
  </div>

</div>

<script>

/* ================= STATE ================= */

let money = 100;
let locationName = "Home";

let inventory = {
  choc: 0,
  cookies: 0,
  lol: 0,
  rare: 0
};

/* BASE PRICES */
let basePrices = {
  school:   { choc: 5 },
  city:     { cookies: 15 },
  festival: { lol: 25 },
  night:    { rare: 80 }
};

/* CURRENT MARKET PRICES */
let prices = JSON.parse(JSON.stringify(basePrices));

/* ================= DYNAMIC PRICES ================= */

function updateMarket(){

  for(let zone in basePrices){
    for(let item in basePrices[zone]){

      let base = basePrices[zone][item];

      // random fluctuation ±60%
      let multiplier = 0.6 + Math.random() * 0.8;

      prices[zone][item] = Math.max(1, Math.floor(base * multiplier));
    }
  }
}

/* ================= EVENTS ================= */

function triggerEvent(){

  let roll = Math.random();

  let msg = "";

  if(roll < 0.2){
    money += 20;
    msg = "💰 Bonus cash drop!";
  }
  else if(roll < 0.4){
    money = Math.max(0, money - 15);
    msg = "⚠️ Theft in the market!";
  }
  else if(roll < 0.6){
    msg = "📉 Market unstable...";
  }
  else if(roll < 0.8){
    msg = "📈 Sugar boom happening!";
  }
  else {
    msg = "🍬 Nothing unusual...";
  }

  let box = document.getElementById("eventBox");
  box.classList.remove("hidden");
  box.innerHTML = `<span class="event">${msg}</span>`;
}

/* ================= TRAVEL ================= */

function travel(zone){
  locationName = zone;

  updateMarket();
  triggerEvent();

  show(zone);
  updateUI();
}

/* ================= SCREEN ================= */

function show(screen){
  hideAll();
  document.getElementById(screen + "Screen").classList.remove("hidden");
}

function back(){
  hideAll();
  document.getElementById("homeScreen").classList.remove("hidden");
}

function hideAll(){
  document.querySelectorAll(".game > div").forEach(d=>{
    if(d.id !== "homeScreen" && d.id !== "eventBox"){
      d.classList.add("hidden");
    }
  });
}

/* ================= ECONOMY ================= */

function buy(item){
  let price = prices[locationName][item];

  if(money >= price){
    money -= price;
    inventory[item]++;
  }

  updateUI();
}

function sell(item){
  let price = prices[locationName][item];

  if(inventory[item] > 0){
    money += price;
    inventory[item]--;
  }

  updateUI();
}

/* ================= INVENTORY ================= */

function updateInventory(){

  let html = "";

  for(let item in inventory){
    html += `${item.toUpperCase()}: ${inventory[item]}<br>`;
  }

  document.getElementById("inventory").innerHTML = html;
}

/* ================= UI ================= */

function updateUI(){

  document.getElementById("money").innerText = money;
  document.getElementById("location").innerText = locationName;

  updateInventory();

  // update price display safely
  for(let item in prices[locationName]){
    let key = locationName.slice(0,2) + "_" + (item === "cookies" ? "buy" : "buy");
    let el = document.getElementById(key);
    if(el) el.innerText = prices[locationName][item];
  }
}

/* ================= START ================= */

updateMarket();
updateUI();

</script>

</body>
</html>
