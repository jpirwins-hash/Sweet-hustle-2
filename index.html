<!DOCTYPE html>
<html>
<head>
  <title>Sweet Hustle v5</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
      display: flex;
      justify-content: center;
    }

    .game {
      width: 100%;
      max-width: 420px;
      padding-bottom: 30px;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .box {
      background: rgba(255,255,255,0.06);
      margin: 12px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-weight: bold;
    }

    button:active {
      transform: scale(0.98);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hidden {
      display: none;
    }

    .good { background: rgba(46,204,113,0.5); }
    .bad { background: rgba(231,76,60,0.5); }
  </style>
</head>

<body>

<div class="game">

  <!-- HEADER -->
  <div class="header">
    💰 £<span id="money"></span> |
    📅 Day <span id="day"></span> |
    📍 <span id="location"></span>
  </div>

  <!-- HOME SCREEN -->
  <div id="homeScreen">

    <div class="box">
      <h3>🏠 Travel</h3>
      <button onclick="showScreen('school')">🏫 School</button>
      <button onclick="showScreen('city')">🏙️ City</button>
      <button onclick="showScreen('shop')">🏪 Shop</button>
      <button onclick="showScreen('festival')">🎡 Festival</button>
    </div>

  </div>

  <!-- SCHOOL -->
  <div id="schoolScreen" class="hidden">

    <div class="box">
      <h3>🏫 School Market</h3>
      <p>Cheap but low profit</p>

      <button onclick="buy('choc','school')">🍫 Buy (£<span id="sc_choc"></span>)</button>
      <button onclick="sell('choc','school')">Sell</button>

      <button onclick="back()">⬅ Back</button>
    </div>

  </div>

  <!-- CITY -->
  <div id="cityScreen" class="hidden">

    <div class="box">
      <h3>🏙️ City Market</h3>
      <p>Balanced prices</p>

      <button onclick="buy('choc','city')">🍫 Buy (£<span id="ci_choc"></span>)</button>
      <button onclick="sell('choc','city')">Sell</button>

      <button onclick="back()">⬅ Back</button>
    </div>

  </div>

  <!-- FESTIVAL -->
  <div id="festivalScreen" class="hidden">

    <div class="box">
      <h3>🎡 Festival Market</h3>
      <p>High risk, high reward</p>

      <button onclick="buy('choc','festival')">🍫 Buy (£<span id="fe_choc"></span>)</button>
      <button onclick="sell('choc','festival')">Sell</button>

      <button onclick="back()">⬅ Back</button>
    </div>

  </div>

</div>

<script>

let money = 100;
let day = 1;
let locationName = "Home";

let inventory = { choc: 0 };

let prices = {
  school: { choc: 5 },
  city: { choc: 10 },
  festival: { choc: 20 }
};

/* SCREEN SYSTEM */
function showScreen(screen){

  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("schoolScreen").classList.add("hidden");
  document.getElementById("cityScreen").classList.add("hidden");
  document.getElementById("festivalScreen").classList.add("hidden");

  document.getElementById(screen + "Screen").classList.remove("hidden");

  locationName = screen.charAt(0).toUpperCase() + screen.slice(1);

  updateUI();
}

/* BACK */
function back(){
  document.getElementById("schoolScreen").classList.add("hidden");
  document.getElementById("cityScreen").classList.add("hidden");
  document.getElementById("festivalScreen").classList.add("hidden");

  document.getElementById("homeScreen").classList.remove("hidden");

  locationName = "Home";
  updateUI();
}

/* BUY */
function buy(item, zone){

  let price = prices[zone][item];

  if(money >= price){
    money -= price;
    inventory[item]++;
  }

  updateUI();
}

/* SELL */
function sell(item, zone){

  let price = prices[zone][item];

  if(inventory[item] > 0){
    money += price;
    inventory[item]--;
  }

  updateUI();
}

/* UI */
function updateUI(){

  document.getElementById("money").innerText = money;
  document.getElementById("day").innerText = day;
  document.getElementById("location").innerText = locationName;

  if(document.getElementById("sc_choc"))
    document.getElementById("sc_choc").innerText = prices.school.choc;

  if(document.getElementById("ci_choc"))
    document.getElementById("ci_choc").innerText = prices.city.choc;

  if(document.getElementById("fe_choc"))
    document.getElementById("fe_choc").innerText = prices.festival.choc;
}

updateUI();

</script>

</body>
</html>
