<!DOCTYPE html>
<html>
<head>
  <title>Sweet Hustle v7</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
      display: flex;
      justify-content: center;
    }

    .game {
      width: 100%;
      max-width: 420px;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.08);
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .box {
      background: rgba(255,255,255,0.06);
      margin: 12px;
      padding: 14px;
      border-radius: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<div class="game">

  <!-- HUD -->
  <div class="header">
    💰 £<span id="money"></span> |
    📍 <span id="location"></span>
  </div>

  <!-- HOME -->
  <div id="homeScreen">

    <div class="box">
      <h3>📍 Travel</h3>
      <button onclick="show('school')">🏫 School</button>
      <button onclick="show('city')">🏙️ City</button>
      <button onclick="show('festival')">🎡 Festival</button>
      <button onclick="show('night')">🌙 Night</button>
    </div>

    <div class="box">
      <h3>📦 Inventory</h3>
      <div id="inventory"></div>
    </div>

  </div>

  <!-- SCHOOL -->
  <div id="schoolScreen" class="hidden box">
    <h3>🏫 School Market</h3>

    <button onclick="buy('choc','school')">Buy Chocolate (£<span id="sc_buy"></span>)</button>
    <button onclick="sell('choc','school')">Sell Chocolate (£<span id="sc_sell"></span>)</button>

    <button onclick="back()">⬅ Back</button>
  </div>

  <!-- CITY -->
  <div id="cityScreen" class="hidden box">
    <h3>🏙️ City Market</h3>

    <button onclick="buy('choc','city')">Buy Chocolate (£<span id="ci_buy"></span>)</button>
    <button onclick="sell('choc','city')">Sell Chocolate (£<span id="ci_sell"></span>)</button>

    <button onclick="buy('cookies','city')">Buy Cookies (£<span id="ci_buy2"></span>)</button>
    <button onclick="sell('cookies','city')">Sell Cookies (£<span id="ci_sell2"></span>)</button>

    <button onclick="back()">⬅ Back</button>
  </div>

  <!-- FESTIVAL -->
  <div id="festivalScreen" class="hidden box">
    <h3>🎡 Festival Market</h3>

    <button onclick="buy('lol','festival')">Buy Lollies (£<span id="fe_buy"></span>)</button>
    <button onclick="sell('lol','festival')">Sell Lollies (£<span id="fe_sell"></span>)</button>

    <button onclick="buy('rare','festival')">Buy Rare (£<span id="fe_buy2"></span>)</button>
    <button onclick="sell('rare','festival')">Sell Rare (£<span id="fe_sell2"></span>)</button>

    <button onclick="back()">⬅ Back</button>
  </div>

  <!-- NIGHT -->
  <div id="nightScreen" class="hidden box">
    <h3>🌙 Night Market</h3>

    <button onclick="buy('rare','night')">Buy Rare (£<span id="ni_buy"></span>)</button>
    <button onclick="sell('rare','night')">Sell Rare (£<span id="ni_sell"></span>)</button>

    <button onclick="back()">⬅ Back</button>
  </div>

</div>

<script>

/* ================= STATE ================= */

let money = 100;
let locationName = "Home";

let inventory = {
  choc: 0,
  cookies: 0,
  lol: 0,
  rare: 0
};

/* PRICE SYSTEM (DOPE WARS STYLE DIFFERENCE) */
let prices = {
  school:   { choc: 5 },
  city:     { choc: 10, cookies: 15 },
  festival: { lol: 20, rare: 60 },
  night:    { rare: 120 }
};

/* ================= SCREEN SYSTEM ================= */

function show(screen){
  hideAll();
  document.getElementById(screen + "Screen").classList.remove("hidden");
  locationName = screen;
  updateUI();
}

function back(){
  hideAll();
  document.getElementById("homeScreen").classList.remove("hidden");
  locationName = "Home";
  updateUI();
}

function hideAll(){
  document.querySelectorAll(".game > div").forEach(d=>{
    if(d.id !== "homeScreen") d.classList.add("hidden");
  });
}

/* ================= ECONOMY ================= */

function buy(item, zone){
  let price = prices[zone][item];

  if(money >= price){
    money -= price;
    inventory[item]++;
  }

  updateUI();
}

function sell(item, zone){
  let price = prices[zone][item];

  if(inventory[item] > 0){
    money += price;
    inventory[item]--;
  }

  updateUI();
}

/* ================= INVENTORY UI ================= */

function updateInventory(){

  let html = "";

  for(let item in inventory){
    html += `${item.toUpperCase()}: ${inventory[item]}<br>`;
  }

  document.getElementById("inventory").innerHTML = html;
}

/* ================= PRICE DISPLAY ================= */

function updatePrices(){
  for(let zone in prices){
    for(let item in prices[zone]){

      let buyEl = document.getElementById(zone.slice(0,2)+"_buy");
      let sellEl = document.getElementById(zone.slice(0,2)+"_sell");

      // optional safe updates (we keep simple UI below)
    }
  }
}

/* ================= UI ================= */

function updateUI(){
  document.getElementById("money").innerText = money;
  document.getElementById("location").innerText = locationName;

  updateInventory();
}

/* ================= START ================= */

updateUI();

</script>

</body>
</html>
